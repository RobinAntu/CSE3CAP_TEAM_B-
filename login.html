<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Flex - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex">
    <!-- Sidebar -->
    <div class="sidebar w-64 h-screen bg-gray-100 p-4 fixed">
        <div>
            <img src="https://via.placeholder.com/50" alt="Study Flex Logo" class="mb-4">
            <h2 class="text-xl font-bold text-blue-600">Study Flex</h2>
            <ul class="mt-6">
                <li class="mb-2"><a href="dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a></li>
                <li class="mb-2"><a href="schedule.html" class="text-gray-600 hover:text-blue-600">Schedule</a></li>
                <li class="mb-2"><a href="input-wizard.html" class="text-gray-600 hover:text-blue-600">Input Wizard</a></li>
                <li class="mb-2"><a href="settings.html" class="text-gray-600 hover:text-blue-600">Settings</a></li>
            </ul>
        </div>
    </div>

    <!-- Content -->
    <div class="content ml-64 p-6">
        <nav class="bg-white p-4 shadow">
            <ul class="flex space-x-4">
                <li><a href="index.html" class="text-gray-600 hover:text-blue-600">Home</a></li>
                <li><a href="schedule.html" class="text-gray-600 hover:text-blue-600">Schedule</a></li>
                <li><a href="input-wizard.html" class="text-gray-600 hover:text-blue-600">Input Wizard</a></li>
                <li><a href="settings.html" class="text-gray-600 hover:text-blue-600">Settings</a></li>
                <li class="ml-auto"><input type="text" placeholder="Search..." class="border p-2 rounded"></li>
            </ul>
        </nav>

        <!-- Login Page -->
        <section class="mt-10 max-w-md mx-auto p-6 bg-white rounded-lg shadow">
            <h2 class="text-2xl font-bold text-blue-600">Study Flex</h2>
            <h3 class="text-xl mt-2">Welcome Back</h3>
            <p class="text-gray-600 mt-2">Login to your account</p>
            <form class="mt-4">
                <div class="mb-4">
                    <label class="block text-gray-700">Email</label>
                    <input type="email" placeholder="Enter your email" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700">Password</label>
                    <input type="password" placeholder="Your secure password" class="w-full p-2 border rounded" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
                <p class="text-center text-blue-600 mt-2">Forgot password?</p>
                <p class="text-center text-blue-600 mt-2">Don't have an account? <a href="signup.html">Sign up</a></p>
            </form>
        </section>
    </div>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="login.js"></script>
</body>
</html>
