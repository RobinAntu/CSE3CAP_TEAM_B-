<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Flex - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex">
    <!-- Sidebar -->
    <div class="sidebar w-64 h-screen bg-gray-100 p-4 fixed">
        <div>
            <img src="https://via.placeholder.com/50" alt="Study Flex Logo" class="mb-4">
            <h2 class="text-xl font-bold text-blue-600">Study Flex</h2>
            <ul class="mt-6">
                <li class="mb-2"><a href="dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a></li>
                <li class="mb-2"><a href="schedule.html" class="text-gray-600 hover:text-blue-600">Schedule</a></li>
                <li class="mb-2"><a href="input-wizard.html" class="text-gray-600 hover:text-blue-600">Input Wizard</a></li>
                <li class="mb-2"><a href="settings.html" class="text-gray-600 hover:text-blue-600">Settings</a></li>
            </ul>
        </div>
    </div>

    <!-- Content -->
    <div class="content ml-64 p-6">
        <nav class="bg-white p-4 shadow">
            <ul class="flex space-x-4">
                <li><a href="index.html" class="text-gray-600 hover:text-blue-600">Home</a></li>
                <li><a href="schedule.html" class="text-gray-600 hover:text-blue-600">Schedule</a></li>
                <li><a href="input-wizard.html" class="text-gray-600 hover:text-blue-600">Input Wizard</a></li>
                <li><a href="settings.html" class="text-gray-600 hover:text-blue-600">Settings</a></li>
                <li class="ml-auto"><input type="text" placeholder="Search..." class="border p-2 rounded"></li>
            </ul>
        </nav>

        <!-- Signup Page -->
        <section class="mt-10 max-w-md mx-auto p-6 bg-white rounded-lg shadow">
            <h2 class="text-2xl font-bold">Sign up</h2>
            <form class="mt-4">
                <div class="mb-4 flex space-x-4">
                    <input type="text" placeholder="First name" class="w-1/2 p-2 border rounded" required>
                    <input type="text" placeholder="Last name" class="w-1/2 p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <input type="email" placeholder="example@email.com" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <input type="password" placeholder="Enter at least 8 characters" class="w-full p-2 border rounded" required>
                </div>
                <label class="flex items-center mb-4">
                    <input type="checkbox" class="mr-2" required>
                    <span class="text-gray-600">By signing up, I agree with the Terms of Use & Privacy Policy</span>
                </label>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">Sign up</button>
                <p class="text-center text-blue-600 mt-2">Already have an account? <a href="login.html">Log in</a></p>
                <div class="text-center mt-4">OR</div>
                <div class="flex justify-center space-x-4 mt-4">
                    <button class="bg-red-600 text-white p-2 rounded-full"><i class="fab fa-google"></i></button>
                    <button class="bg-blue-800 text-white p-2 rounded-full"><i class="fab fa-facebook-f"></i></button>
                    <button class="bg-black text-white p-2 rounded-full"><i class="fab fa-apple"></i></button>
                </div>
            </form>
        </section>
    </div>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
